<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MovieExplorer</title>
    <link rel="stylesheet" href="./index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <script src="./index.js"></script>
</head>

<body class="bg-black">
    <header style="margin-bottom:70px ;">
        <nav class="navbar navbar-expand-lg fixed-top bg-body-black px-4" data-bs-theme="dark">
            <div class="container-fluid">
                <img src="./Images/movie_explorer_logo.png" width="50px" align="right" class="mx-3">
                <a class="navbar-brand fs-3" href="#">Movie<span style="color:aqua;">Expolorer</span></a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav" style="justify-content: end;">
                    <ul class="navbar-nav">

                        <li class="nav-item">
                            <a class="nav-link navlink" href="#">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link navlink" href="#">Trending</a>
                        </li>
                        
                        <li class="nav-item">
                            <a class="nav-link navlink" href="#">Watchlist</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link navlink" href="#">Search</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>


    <div class="blur-1" style="--bg-image: url('./Images/avengers-endgame.jpg');">
        <div class="blur-2">
        <div id="trendingCarousel" class="carousel slide w-100" data-bs-ride="carousel" data-bs-interval="3000">
            
            <div class="carousel-inner">
                
                <div class="carousel-item active">
                    <div class="card text-bg-dark trending mx-auto">
                        <img src="./Images/avengers-endgame.jpg" class="card-img" alt="Avengers Endgame">
                        <div class="card-img-overlay">
                            <h1 class="card-title display-1">Avengers Endgame</h1>
                            <p class="card-text">Rating 5 star</p>
                        </div>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card text-bg-dark trending mx-auto">
                        <img src="./Images/avtar.jpg" class="card-img" alt="Movie 2">
                        <div class="card-img-overlay">
                            <h1 class="card-title display-1">Spider-Man</h1>
                            <p class="card-text">Rating 4.5 star</p>
                        </div>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card text-bg-dark trending mx-auto">
                        <img src="./Images/demon-slayer.jpg" class="card-img" alt="Movie 3">
                        <div class="card-img-overlay">
                            <h1 class="card-title display-1">Oppenheimer</h1>
                            <p class="card-text">Rating 4.8 star</p>
                        </div>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card text-bg-dark trending mx-auto">
                        <img src="./Images/spider-man-brand-new-day.jpg" class="card-img" alt="Movie 4">
                        <div class="card-img-overlay">
                            <h1 class="card-title display-1">The Batman</h1>
                            <p class="card-text">Rating 4.7 star</p>
                        </div>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card text-bg-dark trending mx-auto">
                        <img src="./Images/star-wars.jpg" class="card-img" alt="Movie 5">
                        <div class="card-img-overlay">
                            <h1 class="card-title display-1">Dune: Part Two</h1>
                            <p class="card-text">Rating 4.9 star</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
